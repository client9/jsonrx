# Application configuration — benchmark fixture

[server]
host = "localhost"
port = 8080
debug = false
timeout = 30
max_connections = 1000
tls = true
tls_cert = "/etc/ssl/certs/server.crt"
tls_key = "/etc/ssl/private/server.key"
read_timeout = 15
write_timeout = 15

[database]
url = "postgres://user:pass@localhost/mydb"
pool_size = 10
idle_timeout = 300
max_lifetime = 3600
log_slow_queries = true
slow_query_threshold = 1000
migrations_dir = "/app/migrations"
ssl_mode = "require"

[cache]
provider = "redis"
host = "localhost"
port = 6379
db = 0
ttl = 3600
max_entries = 10000
eviction = "lru"
password = ""

[logging]
level = "info"
format = "json"
output = "stdout"
file = "/var/log/app.log"
max_size = 100
max_backups = 5
max_age = 30
compress = true

[auth]
secret = "supersecretkey"
token_ttl = 86400
refresh_ttl = 604800
algorithm = "HS256"
issuer = "myapp"
audience = "api"

[feature_flags]
new_ui = true
beta_api = false
dark_mode = true
analytics = true
metrics = false
ab_testing = true

[[middleware]]
name = "cors"
enabled = true
origins = ["https://example.com", "https://api.example.com"]
methods = ["GET", "POST", "PUT", "DELETE"]

[[middleware]]
name = "ratelimit"
enabled = true
limit = 100
window = 60
burst = 20

[[middleware]]
name = "auth"
enabled = true
skip_paths = ["/health", "/metrics", "/ready"]
header = "Authorization"

[metrics]
enabled = true
endpoint = "/metrics"
interval = 15
namespace = "myapp"
labels = {app = "myapp", env = "production", region = "us-east-1"}

[notifications]
email_enabled = true
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_user = "notifications@example.com"
slack_enabled = false
slack_webhook = ""
retry_count = 3

[storage]
provider = "s3"
bucket = "myapp-assets"
region = "us-east-1"
prefix = "uploads/"
max_size = 52428800
allowed_types = ["image/jpeg", "image/png", "image/gif", "application/pdf"]
cdn_url = "https://cdn.example.com"

[tracing]
enabled = true
provider = "jaeger"
endpoint = "http://jaeger:14268/api/traces"
sample_rate = 0.1
service_name = "myapp"
